    <title>Rastreamento Inteligente — Acompanhe seus envios em tempo real</title>
    <meta name="description" content="Plataforma completa de rastreamento de encomendas com atualizações em tempo real, notificações automáticas e visibilidade total da sua operação logística.">

    <meta name="author" content="Lovable" />
    <script>
      // Define identidade visual ANTES do React montar para evitar flash da Magnus
      // em domínios de logística (atlas, vetor, jl, etc.).
      (function () {
        try {
          var host = (location.hostname || '').toLowerCase().trim();

          // JL e Vetor foram descontinuados — JL virou Atlas. Redirect imediato preservando path.
          if (
            host === 'jltransportelogistica.com' ||
            host.endsWith('.jltransportelogistica.com') ||
            host === 'vetortransportesltda.com' ||
            host === 'www.vetortransportesltda.com'
          ) {
            location.replace('https://app.atlas-cargo.org' + location.pathname + location.search + location.hash);
            return;
          }

          var MAGNUS = ['magnusfrete.net','www.magnusfrete.net','lp.magnusfrete.net'];
          var isLovablePreview =
            host === 'localhost' || host === '127.0.0.1' ||
            host.endsWith('.lovable.app') || host.endsWith('.lovable.dev') ||
            host.endsWith('.lovableproject.com') || host.endsWith('.lovable.build');
          var isMagnus = MAGNUS.indexOf(host) !== -1 || isLovablePreview;
          if (!isMagnus) {
            var s = document.createElement('style');
            s.textContent = 'html,body{background:#0b0f17 !important;}#root:empty{min-height:100vh;background:#0b0f17;}';
            document.head.appendChild(s);
            document.title = 'Atlas Cargo — Rastreamento';
          }
        } catch (e) {}
      })();
    </script>
